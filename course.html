<!DOCTYPE html>
<html lang="en" class="bg-background">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course — KRNLSec</title>
  <meta name="description" content="Course details, curriculum, instructor and enrollment for KRNLSec cybersecurity training." />
  <meta name="theme-color" content="#090909" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-nav"></div>

  <main id="courseRoot">
    <!-- Populated by JS -->
  </main>

  <section class="section" id="relatedSection" style="display:none">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow">Keep Learning</span>
        <h2>Related courses</h2>
      </div>
      <div class="courses-grid" id="relatedCourses"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/whop-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const { icon, catalogue, curriculum, courseCard, starRow, formatNumber, money, $ } = window.KRNL;

      const id = new URLSearchParams(location.search).get("id");
      const course = catalogue.find((c) => c.id === id) || catalogue[0];
      document.title = `${course.title} — KRNLSec`;

      const totalLessons = curriculum.reduce((n, s) => n + s.lessons.length, 0);
      const save = Math.round(((course.oldPrice - course.price) / course.oldPrice) * 100);
      const initials = course.instructor.split(" ").map((n) => n[0]).join("");

      const learnPoints = [
        "Build a solid, practical foundation you can apply immediately",
        "Use industry-standard tools the way professionals do",
        "Follow a proven methodology from recon to reporting",
        "Understand both how attacks work and how to defend against them",
        "Set up and work confidently in a safe lab environment",
        "Produce clear, professional documentation of your findings",
      ];
      const requirements = [
        "A computer capable of running virtual machines",
        "Basic comfort using a computer and the internet",
        "Curiosity and a willingness to practice hands-on",
        "No prior security experience required for beginner modules",
      ];

      const curriculumHTML = curriculum
        .map((section, i) => `
          <div class="acc-item ${i === 0 ? "open" : ""}">
            <button class="acc-head" aria-expanded="${i === 0}">
              <span>${section.title}</span>
              <span class="acc-meta">${section.lessons.length} lessons</span>
              <span class="chev">${icon("arrowUp")}</span>
            </button>
            <div class="acc-body">
              ${section.lessons
                .map(([title, time, free]) => `
                  <div class="lesson-row ${free ? "" : "locked"}">
                    ${icon(free ? "play" : "lock")}
                    <span>${title}</span>
                    ${free ? `<span class="free-tag">Preview</span>` : ""}
                    <span class="lesson-time">${icon("clock")} ${time}</span>
                  </div>`)
                .join("")}
            </div>
          </div>`)
        .join("");

      $("#courseRoot").innerHTML = `
        <section class="course-detail-hero">
          <div class="grid-overlay"></div>
          <div class="container">
            <nav class="breadcrumb" aria-label="Breadcrumb">
              <a href="index.html">Home</a><span>/</span>
              <a href="courses.html">Courses</a><span>/</span>
              <a href="courses.html?category=${encodeURIComponent(course.category)}">${course.category}</a><span>/</span>
              <span style="color:var(--text-muted)">${course.title}</span>
            </nav>
            <div class="course-hero-grid">
              <div class="course-hero-main reveal">
                <div class="course-meta-top">
                  <span class="badge">${course.category}</span>
                  <span class="badge gray">${course.level}</span>
                  ${course.popular ? `<span class="badge gray">Bestseller</span>` : ""}
                </div>
                <h1>${course.title}</h1>
                <p class="lead">${course.desc}</p>
                <div class="course-hero-meta">
                  ${starRow(course.rating)}
                  <span>${icon("users")} ${formatNumber(course.students)} students</span>
                  <span>${icon("clock")} ${course.hours} hours</span>
                  <span>${icon("video")} ${totalLessons}+ lessons</span>
                  <span>${icon("user")} ${course.instructor}</span>
                </div>
              </div>

              <aside class="enroll-card glass reveal">
                <a class="enroll-thumb" href="lesson.html?id=${course.id}">
                  <img src="${course.thumb}" alt="${course.title} preview" width="380" height="238" />
                  <span class="enroll-play">
                    <span class="play-ring">${icon("play")}</span>
                  </span>
                </a>
                <div class="enroll-body">
                  <div class="enroll-price">
                    <b>${money(course.price)}</b>
                    <small>${money(course.oldPrice)}</small>
                    <span class="save">${save}% off</span>
                  </div>
                  <p class="enroll-note">Lifetime access. 30-day money-back guarantee.</p>
                  <a href="#" class="btn btn-primary btn-block" data-buy="${course.id}">Enroll Now</a>
                  <a href="lesson.html?id=${course.id}" class="btn btn-ghost btn-block" style="margin-top:10px">Preview Course</a>
                  <ul class="enroll-includes">
                    <li>${icon("video")} ${course.hours} hours of on-demand video</li>
                    <li>${icon("download")} Downloadable resources & labs</li>
                    <li>${icon("globe")} Access on mobile and desktop</li>
                    <li>${icon("award")} Certificate of completion</li>
                    <li>${icon("refresh")} Free lifetime updates</li>
                  </ul>
                </div>
              </aside>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="course-content-grid">
              <div>
                <div class="course-block reveal">
                  <h2>What you'll learn</h2>
                  <ul class="learn-grid">
                    ${learnPoints.map((p) => `<li>${icon("check")}<span>${p}</span></li>`).join("")}
                  </ul>
                </div>

                <div class="course-block reveal">
                  <h2>Course curriculum</h2>
                  <div class="accordion" id="accordion">${curriculumHTML}</div>
                </div>

                <div class="course-block reveal">
                  <h2>Requirements</h2>
                  <ul class="learn-grid">
                    ${requirements.map((p) => `<li>${icon("check")}<span>${p}</span></li>`).join("")}
                  </ul>
                </div>

                <div class="course-block reveal">
                  <h2>Your instructor</h2>
                  <div class="glass card instructor-card">
                    <div class="avatar">${initials}</div>
                    <div>
                      <h3>${course.instructor}</h3>
                      <p class="role">Senior Security Professional</p>
                      <p>${course.instructor.split(" ")[0]} has spent over a decade working across offensive and defensive security, from penetration testing engagements to building detection programs. Their teaching focuses on practical, real-world skills that translate directly into the workplace.</p>
                    </div>
                  </div>
                </div>
              </div>

              <aside class="reveal">
                <div class="glass card" style="position:sticky;top:calc(var(--nav-h) + 16px)">
                  <h3 style="margin-bottom:14px">This course includes</h3>
                  <ul class="enroll-includes">
                    <li>${icon("clock")} ${course.hours} hours of content</li>
                    <li>${icon("video")} ${totalLessons}+ video lessons</li>
                    <li>${icon("book")} ${curriculum.length} structured modules</li>
                    <li>${icon("users")} ${formatNumber(course.students)} enrolled</li>
                    <li>${icon("star")} ${course.rating.toFixed(1)} average rating</li>
                  </ul>
                  <a href="#" class="btn btn-primary btn-block" data-buy="${course.id}" style="margin-top:18px">Enroll for ${money(course.price)}</a>
                </div>
              </aside>
            </div>
          </div>
        </section>`;

      // Accordion behaviour
      $("#accordion").addEventListener("click", (e) => {
        const head = e.target.closest(".acc-head");
        if (!head) return;
        const item = head.parentElement;
        const open = item.classList.toggle("open");
        head.setAttribute("aria-expanded", String(open));
      });

      // Related courses (same category, else same level)
      const related = catalogue
        .filter((c) => c.id !== course.id && (c.category === course.category || c.level === course.level))
        .slice(0, 3);
      const finalRelated = related.length ? related : catalogue.filter((c) => c.id !== course.id).slice(0, 3);
      $("#relatedCourses").innerHTML = finalRelated.map(courseCard).join("");
      document.getElementById("relatedSection").style.display = "block";

      window.KRNL.refresh();
    })();
  </script>
</body>
</html>
