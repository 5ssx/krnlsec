<!DOCTYPE html>
<html lang="en" class="bg-background">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses — KRNLSec</title>
  <meta name="description" content="Browse the full KRNLSec course catalogue. Filter by category, level and price across ethical hacking, networking, Linux, web security, cloud, forensics and more." />
  <meta name="theme-color" content="#090909" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-nav"></div>

  <main>
    <section class="page-hero">
      <div class="grid-overlay"></div>
      <div class="container">
        <span class="eyebrow reveal">Course Catalogue</span>
        <h1 class="reveal">Explore our cybersecurity courses</h1>
        <p class="reveal">Practical, hands-on training across every discipline of modern security. Filter to find your next skill.</p>
      </div>
    </section>

    <section class="section" style="padding-top:32px">
      <div class="container">
        <div class="catalog-layout">
          <!-- Filters -->
          <aside class="filters glass" id="filters" aria-label="Course filters">
            <div class="filter-head">
              <h3>Filters</h3>
              <button class="btn btn-ghost btn-sm" id="clearFilters">Clear all</button>
            </div>

            <div class="search-box">
              <span class="search-icon" id="searchIcon"></span>
              <input type="search" id="searchInput" placeholder="Search courses..." aria-label="Search courses" />
            </div>

            <div class="filter-group">
              <h4>Category</h4>
              <div id="categoryFilters" class="filter-options"></div>
            </div>

            <div class="filter-group">
              <h4>Level</h4>
              <div id="levelFilters" class="filter-options"></div>
            </div>

            <div class="filter-group">
              <h4>Price</h4>
              <div id="priceFilters" class="filter-options"></div>
            </div>
          </aside>

          <!-- Results -->
          <div class="catalog-main">
            <div class="catalog-toolbar glass">
              <span id="resultCount">Loading...</span>
              <label class="sort-label">
                Sort by
                <select id="sortSelect" aria-label="Sort courses">
                  <option value="popular">Most popular</option>
                  <option value="rating">Highest rated</option>
                  <option value="price-asc">Price: low to high</option>
                  <option value="price-desc">Price: high to low</option>
                  <option value="title">Title A–Z</option>
                </select>
              </label>
              <button class="btn btn-outline btn-sm filter-toggle" id="filterToggle">Filters</button>
            </div>

            <div class="courses-grid" id="courseResults"></div>
            <div class="empty-state" id="emptyState" hidden>
              <h3>No courses match your filters</h3>
              <p>Try adjusting or clearing your filters to see more results.</p>
              <button class="btn btn-primary" id="resetBtn">Reset filters</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/whop-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const { icon, catalogue, categories, levels, courseCard, formatNumber, $, $$ } = window.KRNL;

      $("#searchIcon").innerHTML = icon("search");

      const state = { search: "", categories: new Set(), levels: new Set(), price: "all", sort: "popular" };

      // Build category filters
      $("#categoryFilters").innerHTML = categories
        .map((c) => `<label class="check"><input type="checkbox" value="${c}" data-filter="category" /><span>${c}</span></label>`)
        .join("");
      $("#levelFilters").innerHTML = levels
        .map((l) => `<label class="check"><input type="checkbox" value="${l}" data-filter="level" /><span>${l}</span></label>`)
        .join("");
      const priceOptions = [["all", "All prices"], ["free-low", "Under $60"], ["mid", "$60 – $100"], ["high", "$100+"]];
      $("#priceFilters").innerHTML = priceOptions
        .map(([v, label], i) => `<label class="check radio"><input type="radio" name="price" value="${v}" data-filter="price" ${i === 0 ? "checked" : ""} /><span>${label}</span></label>`)
        .join("");

      function matches(c) {
        if (state.search && !c.title.toLowerCase().includes(state.search) && !c.category.toLowerCase().includes(state.search)) return false;
        if (state.categories.size && !state.categories.has(c.category)) return false;
        if (state.levels.size && !state.levels.has(c.level)) return false;
        if (state.price === "free-low" && c.price >= 60) return false;
        if (state.price === "mid" && (c.price < 60 || c.price > 100)) return false;
        if (state.price === "high" && c.price <= 100) return false;
        return true;
      }

      function sortList(list) {
        const s = state.sort;
        return [...list].sort((a, b) => {
          if (s === "popular") return b.students - a.students;
          if (s === "rating") return b.rating - a.rating;
          if (s === "price-asc") return a.price - b.price;
          if (s === "price-desc") return b.price - a.price;
          if (s === "title") return a.title.localeCompare(b.title);
          return 0;
        });
      }

      function render() {
        const filtered = sortList(catalogue.filter(matches));
        const grid = $("#courseResults");
        grid.innerHTML = filtered.map(courseCard).join("");
        $("#resultCount").textContent = `${filtered.length} course${filtered.length === 1 ? "" : "s"} found`;
        $("#emptyState").hidden = filtered.length !== 0;
        window.KRNL.refresh();
      }

      // Events
      $("#searchInput").addEventListener("input", (e) => { state.search = e.target.value.trim().toLowerCase(); render(); });
      $("#sortSelect").addEventListener("change", (e) => { state.sort = e.target.value; render(); });
      $$('input[data-filter]').forEach((input) => {
        input.addEventListener("change", () => {
          const type = input.dataset.filter;
          if (type === "category" || type === "level") {
            const set = state[type === "category" ? "categories" : "levels"];
            if (input.checked) set.add(input.value); else set.delete(input.value);
          } else if (type === "price") {
            state.price = input.value;
          }
          render();
        });
      });

      function clearAll() {
        state.search = ""; state.categories.clear(); state.levels.clear(); state.price = "all"; state.sort = "popular";
        $("#searchInput").value = "";
        $("#sortSelect").value = "popular";
        $$('input[data-filter="category"], input[data-filter="level"]').forEach((i) => (i.checked = false));
        $('input[value="all"]').checked = true;
        render();
      }
      $("#clearFilters").addEventListener("click", clearAll);
      $("#resetBtn").addEventListener("click", clearAll);

      // Mobile filter toggle
      $("#filterToggle").addEventListener("click", () => $("#filters").classList.toggle("open"));

      // Deep link: ?category=Python
      const params = new URLSearchParams(location.search);
      const preCat = params.get("category");
      if (preCat) {
        const box = $(`input[data-filter="category"][value="${preCat}"]`);
        if (box) { box.checked = true; state.categories.add(preCat); }
      }

      render();
    })();
  </script>
</body>
</html>
