<!DOCTYPE html>
<html lang="en" class="bg-background">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing — KRNLSec</title>
  <meta name="description" content="Get lifetime access to the Zero to Hero in Cybersecurity course for just $10. 30 videos, 6 sections, real hands-on labs." />
  <meta name="theme-color" content="#090909" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="site-nav"></div>

  <main>
    <!-- HERO -->
    <section class="page-head">
      <div class="container">
        <div class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a><span>/</span>
          <span style="color:var(--text-muted)">Pricing</span>
        </div>
        <span class="eyebrow text-primary">One Course. Everything You Need.</span>
        <h1>Get lifetime access for just $10</h1>
        <p>No subscriptions. No hidden fees. Pay once, keep the course forever — including all future updates.</p>
      </div>
    </section>

    <!-- COURSE CARD -->
    <section class="section" style="padding-top:48px">
      <div class="container">
        <div id="pricingGrid"></div>
      </div>
    </section>

    <!-- FAQ -->
    <section class="section" style="padding-top:0">
      <div class="container">
        <div class="section-head reveal">
          <span class="eyebrow">FAQs</span>
          <h2>Frequently Asked Questions</h2>
          <p>Everything you need to know before enrolling.</p>
        </div>
        <div class="faq" id="faqAccordion"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/whop-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const { icon, $ } = window.KRNL;

      // Single course card
      const feats = [
        "30 HD video lessons across 6 structured sections",
        "Networking, Linux, Ethical Hacking, Web Security & more",
        "Hands-on labs with real tools (Kali, Nmap, Burp Suite)",
        "Lifetime access — including all future updates",
        "Certificate of Completion (PDF)",
        "Access on desktop, tablet & mobile",
      ];

      $("#pricingGrid").innerHTML = `
        <div class="plan glass reveal featured" style="max-width:520px; margin:0 auto">
          <h3>Zero to Hero in Cybersecurity</h3>
          <p class="plan-desc">The complete beginner-to-professional cybersecurity roadmap. One payment, lifetime access.</p>
          <div class="plan-price">$10<span> one-time</span></div>
          <ul class="plan-features">
            ${feats.map(f => `<li>${icon("check")}<span>${f}</span></li>`).join("")}
          </ul>
          <a href="#" data-buy="z2h" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">Enroll Now — $10</a>
          <p style="text-align:center; font-size:0.8rem; color:var(--text-dim); margin-top:14px">Secure checkout via Whop &middot; 30-day money-back guarantee</p>
        </div>
      `;

      const faqs = [
        ["Is this a one-time payment or a subscription?", "It's a single one-time payment of $10. You pay once and get lifetime access to all 30 videos, including any future updates we add to the course."],
        ["What exactly is covered in the 30 videos?", "The course is divided into 6 sections: Cybersecurity Foundations, Networking, Linux for Security, Ethical Hacking & Penetration Testing, Web Application Security, and Defensive Security & Career Planning. Each section has 5 practical videos."],
        ["Do I need any prior experience?", "None at all. The course starts from absolute zero — no coding, no Linux, no networking knowledge required. By the end you'll have real, job-ready skills."],
        ["How does Whop handle my payment?", "Whop uses Stripe and other secure payment processors. Your card details are fully encrypted and never stored on KRNLSec servers. You can get a refund within 30 days if you're not satisfied."],
        ["Will I get a certificate when I finish?", "Yes. A PDF Certificate of Completion is issued when you complete all 30 videos. You can download it and share it on LinkedIn or with employers."],
        ["Do I keep access if the course is updated?", "Yes. All updates are included for life. If new videos are added, you'll get them at no extra charge."],
      ];

      $("#faqAccordion").innerHTML = faqs
        .map(([q, a], i) => `
        <div class="acc-item ${i === 0 ? "open" : ""}">
          <button class="acc-head" aria-expanded="${i === 0}">
            <b>${q}</b>
            <span class="chev">${icon("arrowUp")}</span>
          </button>
          <div class="acc-body">
            <p style="padding:16px 20px; color:var(--text-muted); font-size:0.92rem; line-height:1.6">${a}</p>
          </div>
        </div>`).join("");

      $("#faqAccordion").addEventListener("click", (e) => {
        const head = e.target.closest(".acc-head");
        if (!head) return;
        const item = head.parentElement;
        const open = item.classList.toggle("open");
        head.setAttribute("aria-expanded", String(open));
      });

      window.KRNL.refresh();
    })();
  </script>
</body>
</html>
